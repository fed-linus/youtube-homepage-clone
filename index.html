<!DOCTYPE html>
<html>
  <head>
    <title>VideoHub - Learning Project</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet">

    <link rel="stylesheet" href="styles/general.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/video.css">
    <link rel="stylesheet" href="styles/sidebar.css">
  </head>

  <body>

    <!-- simple disclaimer -->
    <div style="background:#fff3cd;padding:8px;text-align:center;font-size:14px;">
      ⚠️ This is a personal learning project and is not affiliated with YouTube.
    </div>

    <header class="header">

      <div class="left-section"> 
        <img class="hamburger-menu" src="icons/hamburger-menu.svg"> 

        <!-- Replace this file with your own logo -->
        <img class="youtube-logo" src="icons/site-logo.svg"> 
      </div>

      <div class="middle-section"> 
        <input class="search-bar" type="text" placeholder="Search">
        <button class="search-button"> 
          <img class="search-icon" src="icons/search.svg">
          <div class="tooltip"> Search </div> 
        </button> 
        <button class="voice-search-button"> 
          <img class="voice-search-icon" src="icons/voice-search-icon.svg">
          <div class="tooltip"> Search with voice </div> 
        </button>
      </div>

      <div class="right-section">

        <div class="upload-icon-container">
          <img class="upload-icon" src="icons/upload.svg">
          <div class="tooltip"> Create </div> 
        </div>

        <div class="youtube-apps-container">
          <img class="youtube-apps-icon" src="icons/youtube-apps.svg">
          <div class="tooltip"> Apps </div>
        </div>

        <div class="notifications-icon-container">
          <img class="notifications-icon" src="icons/notifications.svg">
          <div class="notifications-count">3</div>
          <div class="tooltip"> Notifications </div>
        </div>

        <img class="current-user-picture" src="channel-pictures/my-channel.png">
      </div>
    </header>
