<!DOCTYPE html>
<html>
  <head>
    <title>VideoHub Learning Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/general.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/video.css">
    <link rel="stylesheet" href="styles/sidebar.css">
  </head>

  <body>
    <!-- Disclaimer visible on the page -->
    <header class="header">
      <strong>⚠️ Personal Learning Project - Not affiliated with YouTube</strong>

      <div class="left-section">
        <img class="hamburger-menu" src="icons/hamburger-menu.svg">
        <!-- Replace logo with neutral placeholder -->
        <img class="site-logo" src="icons/videohub-logo.svg" alt="VideoHub Logo">
      </div>

      <div class="middle-section">
        <input class="search-bar" type="text" placeholder="Search videos">
        <button class="search-button">
          <img class="search-icon" src="icons/search.svg">
          <div class="tooltip">Search</div>
        </button>
        <button class="voice-search-button">
          <img class="voice-search-icon" src="icons/voice-search-icon.svg">
          <div class="tooltip">Voice Search</div>
        </button>
      </div>

      <div class="right-section">
        <div class="upload-icon-container">
          <img class="upload-icon" src="icons/upload.svg">
          <div class="tooltip">Create</div>
        </div>

        <div class="apps-container">
          <img class="apps-icon" src="icons/apps.svg">
          <div class="tooltip">Apps</div>
        </div>

        <div class="notifications-icon-container">
          <img class="notifications-icon" src="icons/notifications.svg">
          <div class="notifications-count">3</div>
          <div class="tooltip">Notifications</div>
        </div>

        <img class="current-user-picture" src="channel-pictures/my-channel.png" alt="Profile">
      </div>
    </header>

    <nav class="sidebar">
      <div class="sidebar-link"><img src="icons/home.svg"><div>Home</div></div>
      <div class="sidebar-link"><img src="icons/explore.svg"><div>Explore</div></div>
      <div class="sidebar-link"><img src="icons/subscriptions.svg"><div>Subscriptions</div></div>
      <div class="sidebar-link"><img src="icons/originals.svg"><div>Originals</div></div>
      <div class="sidebar-link"><img src="icons/music.svg"><div>Music</div></div>
      <div class="sidebar-link"><img src="icons/library.svg"><div>Library</div></div>
    </nav>

    <main>
      <section class="video-grid">
        <!-- Example video preview -->
        <div class="video-preview">
          <div class="thumbnail-row">
            <img class="thumbnail" src="thumbnail/thumbnail-1.webp" alt="Video thumbnail">
            <div class="video-time">14:20</div>
          </div>

          <div class="video-info-grid">
            <div class="channel-picture">
              <img class="profile-picture" src="channel-pictures/channel-1.jpeg" alt="Profile">
            </div>
            <div class="video-info">
              <p class="video-title">Talking Tech and AI with Google CEO</p>
              <p class="video-author">Marques Brownlee</p>
              <p class="video-stats">3.4M views · 6 months ago</p>
            </div>
          </div>
        </div>
        <!-- Add other videos similarly -->
      </section>
    </main>
  </body>
</html>
